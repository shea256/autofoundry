[pytest]
# Pytest configuration for mechatrainer

# Define custom markers
markers =
    integration: marks tests as integration tests that interact with real APIs (deselect with '-m "not integration"')
    slow: marks tests as slow running (deselect with '-m "not slow"')

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# Test paths
testpaths = tests
